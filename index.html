<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@600&family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css?v=2026-07-23.32">
</head>
<body data-build="2026-07-23.32">

<!-- home -->
<section id="view-home" class="view" hidden>
  <div class="lamp" aria-hidden="true"></div>

  <header class="brand">
    <p class="eyebrow" data-i18n="home.eyebrow"></p>
    <h1 data-i18n="home.title"></h1>
  </header>

  <label class="field">
    <span class="field-label" data-i18n="home.nameLabel"></span>
    <input id="inName" maxlength="16" autocomplete="off" data-i18n-placeholder="home.namePlaceholder">
  </label>

  <button class="btn btn-primary btn-block" id="btnHost" data-i18n="home.host"></button>

  <div class="join-row">
    <input id="inCode" class="code-input" maxlength="4" autocomplete="off"
           autocapitalize="characters" spellcheck="false" data-i18n-placeholder="home.codePlaceholder">
    <button class="btn btn-block" id="btnJoin" data-i18n="home.join"></button>
  </div>
  <div class="segmented join-as" id="joinAs"></div>

  <button class="btn btn-block btn-muted" id="btnRulesHome" data-i18n="rules.title"></button>
  <button class="btn btn-block btn-muted" id="btnSetting" data-i18n="home.setting"></button>

  <div id="audioHome"></div>

  <p class="err" id="homeErr" hidden></p>
</section>

<!-- setting -->
<section id="view-setting" class="view" hidden>
  <button class="link" id="btnSettingBack" data-i18n="set.back"></button>
  <h2 class="view-title" data-i18n="set.title"></h2>

  <div class="field">
    <span class="field-label" data-i18n="set.avatar"></span>
    <div class="avatar-pick">
      <span id="avatarPreview"></span>
      <div class="avatar-btns">
        <button class="btn btn-slim" id="btnAvatarPick" data-i18n="set.avatarPick"></button>
        <button class="btn btn-slim" id="btnAvatarClear" data-i18n="set.avatarClear"></button>
      </div>
    </div>
    <input type="file" id="avatarFile" accept="image/*" hidden>
    <p class="hint" id="avatarNote" data-i18n="set.avatarNote"></p>
  </div>

  <div class="field">
    <span class="field-label" data-i18n="set.language"></span>
    <div class="segmented" id="langPick"></div>
  </div>
  <p class="hint" data-i18n="set.langNote"></p>

  <div class="field">
    <span class="field-label" data-i18n="audio.label"></span>
    <div id="audioSetting"></div>
  </div>
</section>

<!-- game rules -->
<section id="view-rules" class="view" hidden>
  <button class="link" id="btnRulesBack"></button>
  <h2 class="view-title" id="rulesTitle"></h2>
  <div id="rulesBody"></div>
</section>

<!-- lobby -->
<section id="view-lobby" class="view" hidden>
  <div class="row-top">
    <button class="link" id="btnLeave" data-i18n="lobby.leave"></button>
    <button class="btn btn-slim" id="btnRules" data-i18n="rules.title"></button>
    <button class="btn btn-slim" id="btnInvite" data-i18n="lobby.invite"></button>
    <button class="code-chip" id="codeChip" data-i18n-title="lobby.copy">
      <span class="code-chip-label" data-i18n="lobby.codeLabel"></span>
      <span class="code-chip-value" id="outCode">--</span>
    </button>
  </div>

  <div class="lobby-grid">
    <div class="pane pane-left">
      <div id="memberList"></div>
      <p class="note bad" id="avatarWarn" hidden></p>
    </div>

    <div class="pane pane-right">
      <h2 class="view-title" data-i18n="lobby.pickGame"></h2>
      <div class="games-scroll">
        <div class="games" id="games"></div>
      </div>
      <div class="game-settings" id="gameSettings"></div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-ready" id="btnReady"></button>
    <button class="btn btn-primary" id="btnStart" hidden></button>
  </div>
  <p class="note" id="lobbyNote"></p>

  <div id="audioLobby"></div>
</section>

<!-- game stage -->
<section id="view-play" class="view" hidden>
  <div class="row-top">
    <button class="link" id="btnBack" hidden data-i18n="play.back"></button>
    <button class="btn btn-slim" id="btnRulesPlay" data-i18n="rules.title"></button>
    <span class="play-code" id="playCode"></span>
  </div>
  <div id="gameStage"></div>
  <div id="audioPlay"></div>
</section>

<!-- crop dialog -->
<div id="cropModal" class="modal" hidden>
  <div class="modal-card">
    <h3 data-i18n="crop.title"></h3>
    <div class="crop-view" id="cropView">
      <img id="cropImg" alt="" draggable="false">
      <div class="crop-ring" aria-hidden="true"></div>
    </div>
    <input type="range" id="cropZoom" class="vol" min="100" max="320" value="100">
    <p class="hint" data-i18n="crop.hint"></p>
    <div class="modal-actions">
      <button class="btn" id="cropCancel" data-i18n="crop.cancel"></button>
      <button class="btn btn-primary" id="cropOk" data-i18n="crop.ok"></button>
    </div>
  </div>
</div>

<!-- chat dock -->
<div id="chatDock" class="chat-dock" hidden>
  <button class="chat-head" id="chatToggle">
    <span data-i18n="chat.title"></span>
    <span class="chat-unread" id="chatUnread" hidden></span>
  </button>
  <div class="chat-body" id="chatBody" hidden>
    <ul class="chat-list" id="chatList"></ul>
    <div class="chat-input">
      <input id="chatText" maxlength="300" data-i18n-placeholder="chat.placeholder">
      <button class="btn btn-slim" id="chatSend" data-i18n="chat.send"></button>
    </div>
    <p class="chat-note" id="chatNote" hidden></p>
  </div>
</div>

<div id="boot" class="boot"><p id="bootText">กำลังโหลดไฟล์…</p></div>

<script>
/* ตัวดักพังก่อนที่โมดูลจะเริ่มทำงาน — เขียนเป็นสคริปต์ธรรมดา ไม่ใช่โมดูล
   จะได้รันได้แม้ไฟล์อื่นโหลดไม่ขึ้น จอว่างเปล่าที่ไม่บอกอะไรเลยคือสิ่งที่หาสาเหตุยากที่สุด */
(function () {
  function fail(msg) {
    var box = document.getElementById('boot'), tx = document.getElementById('bootText');
    if (!box || !tx) return;
    box.hidden = false; box.className = 'boot bad'; tx.textContent = msg;
  }
  window.addEventListener('error', function (e) {
    var src = e.target && (e.target.src || e.target.href);
    if (src) fail('โหลดไฟล์ไม่สำเร็จ\n' + src + '\n\nไฟล์นี้อาจยังไม่ได้ push ขึ้นไป');
    else if (e.message) fail('เกิดข้อผิดพลาด\n' + e.message);
  }, true);
  window.addEventListener('unhandledrejection', function (e) {
    fail('เกิดข้อผิดพลาด\n' + ((e.reason && e.reason.message) || e.reason || ''));
  });
  // ถ้า 8 วินาทีแล้วยังไม่มีหน้าไหนโผล่ ให้บอกไปเลย ดีกว่าปล่อยจอว่าง
  setTimeout(function () {
    var any = document.querySelector('.view:not([hidden])');
    var boot = document.getElementById('boot');
    if (!any && boot && boot.hidden) fail('แอปเริ่มไม่สำเร็จ\nเปิด F12 แล้วดูแท็บ Console');
  }, 8000);
})();
</script>

<script src="js/env.js?v=2026-07-23.32"></script>
<script type="module" src="js/app.js?v=2026-07-23.32"></script>
</body>
</html>
